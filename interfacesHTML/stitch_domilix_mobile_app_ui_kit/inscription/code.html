<body class="bg-background text-on-background font-body-md antialiased min-h-screen">
<!-- Split Screen Layout for Premium Transactional Experience -->
<div class="flex min-h-screen">
<!-- Left Column: Form -->
<div class="w-full lg:w-[45%] xl:w-[40%] flex flex-col bg-surface shadow-[10px_0px_30px_rgba(82,69,52,0.03)] z-10 overflow-y-auto">
<div class="w-full max-w-[480px] mx-auto flex flex-col flex-1 px-margin-mobile md:px-12 py-12">
<!-- Back Action -->
<div class="mb-16">
<a class="inline-flex items-center justify-center w-12 h-12 rounded-full border border-outline-variant text-on-surface-variant hover:text-primary hover:border-primary transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</a>
</div>
<!-- Headline -->
<div class="mb-10 flex flex-col gap-3">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Créer un compte</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Rejoignez une communauté d'excellence immobilière.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-6">
<!-- Name Field -->
<div class="flex flex-col gap-2 relative">
<label class="font-label-sm text-label-sm text-on-surface ml-1">Nom complet</label>
<input class="w-full px-4 py-4 bg-surface border border-outline-variant rounded-xl text-body-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors placeholder:text-on-surface-variant/40" placeholder="Jean Dupont" type="text"/>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2 relative">
<label class="font-label-sm text-label-sm text-on-surface ml-1">Adresse e-mail</label>
<input class="w-full px-4 py-4 bg-surface border border-outline-variant rounded-xl text-body-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors placeholder:text-on-surface-variant/40" placeholder="jean.dupont@exemple.com" type="email"/>
</div>
<!-- Phone Field -->
<div class="flex flex-col gap-2 relative">
<label class="font-label-sm text-label-sm text-on-surface ml-1">Numéro de téléphone</label>
<div class="flex border border-outline-variant rounded-xl overflow-hidden focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-colors bg-surface h-[58px]">
<div class="flex items-center justify-center px-4 bg-surface-container text-on-surface-variant font-label-sm text-label-sm border-r border-outline-variant select-none">
                                +237
                            </div>
<input class="w-full px-4 py-4 bg-transparent border-none text-body-md font-body-md focus:ring-0 outline-none placeholder:text-on-surface-variant/40" placeholder="6 00 00 00 00" type="tel"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2 relative">
<label class="font-label-sm text-label-sm text-on-surface ml-1">Mot de passe</label>
<div class="relative flex items-center h-[58px]">
<input class="w-full h-full px-4 bg-surface border border-outline-variant rounded-xl text-body-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors placeholder:text-on-surface-variant/40 pr-12" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 mt-4">
<div class="flex items-center h-6">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary bg-surface transition-colors cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant leading-relaxed cursor-pointer select-none" for="terms">
                            J'accepte les <a class="text-primary font-bold hover:underline" href="#">conditions d'utilisation</a> et la politique de confidentialité.
                        </label>
</div>
<!-- Primary CTA -->
<button class="w-full py-4 mt-6 bg-primary text-on-primary rounded-xl font-label-sm text-label-sm uppercase tracking-wider hover:bg-surface-tint transition-all shadow-[0px_4px_14px_rgba(99,63,0,0.15)] hover:shadow-[0px_6px_20px_rgba(99,63,0,0.2)]" type="submit">
                        S'inscrire
                    </button>
</form>
<!-- Footer Link -->
<div class="mt-auto pt-12 pb-4 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Déjà un compte ? <a class="text-primary font-bold hover:underline transition-all" href="#">Se connecter</a>
</p>
</div>
</div>
</div>
<!-- Right Column: Editorial Image (Hidden on Mobile) -->

</div>

<div class="absolute bottom-12 right-12 z-20">
<span class="font-headline-lg text-headline-lg text-surface font-bold tracking-tight opacity-90 drop-shadow-lg">Domilix</span>
</div>
</div>
</div>
