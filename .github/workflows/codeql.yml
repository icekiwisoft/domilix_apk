name: "CodeQL"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ "main", "master", "develop" ]
  schedule:
    - cron: '21 2 * * 3'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: [analyze]
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop' && (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'master')
    permissions:
      contents: write

    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: 💾 Cache EAS local build
        uses: actions/cache@v4
        with:
          path: ~/.eas-build-local
          key: eas-local-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: eas-local-${{ runner.os }}-

      - name: ⚡ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Build APK
        run: eas build --platform android --profile preview --non-interactive --local
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

      - name: 📥 Get APK filename
        id: get-apk
        run: echo "path=$(ls *.apk)" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Domilix v${{ github.run_number }}
          files: ${{ steps.get-apk.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
